version: '1.0'

services:
  headcore-frontend:
    image: node:22-alpine
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "npm install -g sass && sass --watch resources/scss/main.scss:public/assets/css/main.css resources/scss/admin.scss:public/assets/css/admin.css"
    networks:
      - headcore-net

  headcore-backend:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    ports:
      - 80:80
    depends_on:
      - headcore-db-postgre
    environment:
      POSTGRES_HOST: headcore-db-postgre
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - headcore-net

  headcore-db-postgre:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - headcore-db-data:/var/lib/postgresql
    restart: unless-stopped
    networks:
      - headcore-net

  headcore-dbadminer:
    image: adminer:4
    restart: unless-stopped
    depends_on:
      - headcore-db-postgre
    ports:
      - 8080:80
    networks:
      - headcore-net

networks:
  headcore-net:
    driver: bridge

volumes:
  headcore-db-data:
  vendor_data: